# fly.toml app configuration file generated for landry-backend
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "landry-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[build.env]
  PYTHONUNBUFFERED = "true"

[env]
  PORT = "8000"
  DEBUG = "False"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[services.http_checks]]
  grace_period = "10s"
  interval = 10000
  timeout = 5000
  method = "get"
  path = "/api/health/"

[checks]
  [checks.release]
    type = "exec"
    command = ["python", "manage.py", "migrate"]
    timeout = "10s"

[[statics]]
  guest_path = "/app/static"
  url_prefix = "/static/"
